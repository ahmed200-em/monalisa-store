<!DOCTYPE html>
<html lang="fr">
<head>
    <!--
        ========================================================================
        ADMIN PANEL - DOCUMENT HEAD
        ========================================================================
        Purpose: Configuration and resource loading for the admin dashboard.

        This page provides a password-protected interface for managing:
          - Customer orders (view, filter, clear)
          - Product catalog (add, edit, delete)
          - Business statistics (revenue, profit, delivery fees)

        Resources loaded:
          - css/admin-styles.css  : Dedicated admin panel styles
          - Font Awesome 6         : Icon library for UI elements
          - Google Fonts (Poppins) : Typography family (weights 300-700)
        ========================================================================
    -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Monalisa Store</title>
    <link rel="stylesheet" href="css/admin-styles.css">

    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <!--
        ========================================================================
        LOGIN SCREEN
        ========================================================================
        Purpose: Password-protected gate that blocks access to the admin dashboard.

        Behavior:
          - Visible by default (no 'hidden' class).
          - On successful password entry, JS adds 'hidden' to #loginScreen and
            removes 'hidden' from #adminDashboard.
          - Password validation is handled in js/admin.js.

        Key IDs:
          - #loginScreen     : Outer container; visibility toggled by JS.
          - #loginForm       : Form element; submit event handled in admin.js.
          - #adminPassword   : Password input; value read for authentication.
        ========================================================================
    -->
    <div id="loginScreen" class="login-screen">
        <div class="login-container">
            <div class="login-header">
                <img src="image/logo.jpg" alt="Monalisa Logo" class="login-logo">
                <h2>Monalisa Admin</h2>
                <p>Accès réservé au propriétaire</p>
            </div>
            <form id="loginForm" class="login-form">
                <div class="form-group">
                    <!-- Password input: JS reads this value to verify against stored credential -->
                    <input type="password" id="adminPassword" placeholder="Mot de passe" required>
                    <i class="fas fa-lock"></i>
                </div>
                <button type="submit" class="login-btn">
                    <i class="fas fa-sign-in-alt"></i> Se connecter
                </button>
            </form>
        </div>
    </div>
    <!-- Admin Dashboard -->
    <div id="adminDashboard" class="admin-dashboard hidden">
        <!-- Header -->
        <header class="admin-header">
            <div class="header-content">
                <div class="header-left">
                    <img src="image/logo.jpg" alt="Monalisa Logo" class="header-logo">
                    <h1>Monalisa Admin</h1>
                </div>
                <div class="header-right">
                    <!-- Refresh button: Reloads orders/products from localStorage -->
                    <button class="refresh-btn" id="refreshOrders">
                        <i class="fas fa-sync-alt"></i> Actualiser
                    </button>
                    <!-- Logout button: Resets UI back to login screen -->
                    <button class="logout-btn" id="logoutBtn">
                        <i class="fas fa-sign-out-alt"></i> Déconnexion
                    </button>
                </div>
            </div>
        </header>

        <!-- Navigation Tabs -->
        <nav class="admin-nav">
            <button class="nav-tab active" data-tab="orders">
                <i class="fas fa-shopping-cart"></i> Commandes
            </button>
            <button class="nav-tab" data-tab="products">
                <i class="fas fa-box"></i> Produits
            </button>
            <button class="nav-tab" data-tab="analytics">
                <i class="fas fa-chart-line"></i> Analytiques
            </button>
        </nav>

        <!--
            ================================================================
            NAVIGATION TABS: Switch between Orders and Products views
            ================================================================
            Behavior:
              - data-tab attribute used by JS to show/hide corresponding sections.
              - 'active' class indicates the currently selected tab.
              - Click handlers in admin.js toggle section visibility based on data-tab.

            Key IDs / Attributes:
              - data-tab="orders"   : Shows the orders section (default view).
              - data-tab="products"  : Shows the products management section.
            ================================================================
        -->
        <nav class="admin-nav">
            <div class="container">
                <div class="nav-tabs">
                    <button class="nav-tab active" data-tab="orders">
                        <i class="fas fa-shopping-cart"></i> Commandes
                    </button>
                    <button class="nav-tab" data-tab="products">
                        <i class="fas fa-box"></i> Produits
                    </button>
                </div>
            </div>
        </nav>

        <!--
            ========================================================================
            STATISTICS SECTION
            ========================================================================
            Purpose: Display key business metrics at a glance in a responsive grid.

            Data: All values are dynamically updated by admin.js from localStorage data.

            Layout: 6 stat cards, each with an icon, numeric value (h3), and label.

            Key IDs (all updated by JS):
              - #totalOrders     : Total number of orders received.
              - #todayOrders     : Orders placed today.
              - #totalRevenue    : Total revenue (sum of all order amounts).
              - #totalProfit     : Total profit (revenue minus product costs).
              - #todayProfit     : Profit earned today.
              - #deliveryRevenue : Total delivery fees collected.
            ========================================================================
        -->
        <section class="stats-section">
            <div class="container">
                <div class="stats-grid">

                    <!-- Stat Card 1: Total Orders -->
                    <div class="stat-card">
                        <div class="stat-icon">
                            <i class="fas fa-shopping-cart"></i>
                        </div>
                        <div class="stat-info">
                            <h3 id="totalOrders">0</h3>
                            <p>Commandes totales</p>
                        </div>
                    </div>

                    <!-- Stat Card 2: Today's Orders -->
                    <div class="stat-card">
                        <div class="stat-icon">
                            <i class="fas fa-clock"></i>
                        </div>
                        <div class="stat-info">
                            <h3 id="todayOrders">0</h3>
                            <p>Aujourd'hui</p>
                        </div>
                    </div>

                    <!-- Stat Card 3: Total Revenue -->
                    <div class="stat-card">
                        <div class="stat-icon">
                            <i class="fas fa-money-bill"></i>
                        </div>
                        <div class="stat-info">
                            <h3 id="totalRevenue">0 MAD</h3>
                            <p>Chiffre d'affaires</p>
                        </div>
                    </div>

                    <!-- Stat Card 4: Total Profit -->
                    <div class="stat-card">
                        <div class="stat-icon">
                            <i class="fas fa-chart-line"></i>
                        </div>
                        <div class="stat-info">
                            <h3 id="totalProfit">0 MAD</h3>
                            <p>Profit total</p>
                        </div>
                    </div>

                    <!-- Stat Card 5: Today's Profit -->
                    <div class="stat-card">
                        <div class="stat-icon">
                            <i class="fas fa-calendar-day"></i>
                        </div>
                        <div class="stat-info">
                            <h3 id="todayProfit">0 MAD</h3>
                            <p>Profit aujourd'hui</p>
                        </div>
                    </div>

                    <!-- Stat Card 6: Delivery Fees -->
                    <div class="stat-card">
                        <div class="stat-icon">
                            <i class="fas fa-truck"></i>
                        </div>
                        <div class="stat-info">
                            <h3 id="deliveryRevenue">0 MAD</h3>
                            <p>Frais de livraison</p>
                        </div>
                    </div>

                </div>
            </div>
        </section>

        <!--
            ========================================================================
            ORDERS SECTION
            ========================================================================
            Purpose: Display and manage customer orders.

            Behavior:
              - Orders are loaded from localStorage and rendered dynamically by JS.
              - Each order card is generated from a JS template (not hardcoded in HTML).
              - Status filter dropdown allows filtering by order status.
              - "Clear all" button deletes all orders (with confirmation prompt).

            Key IDs:
              - #statusFilter    : Select dropdown for filtering orders by status
                                   (all / new / processing / completed).
              - #clearAllOrders  : Button to delete all orders (triggers confirmation in JS).
              - #ordersContainer : Dynamic content area where order cards are rendered.
                                   - Default state: Shows "no orders" placeholder message.
                                   - Populated by: admin.js renders order cards here.
            ========================================================================
        -->
        <section class="orders-section">
            <div class="container">
                <div class="section-header">
                    <h2>Commandes recentes</h2>
                    <div class="filters">
                        <!-- Status filter dropdown: JS reads selected value to filter displayed orders -->
                        <select id="statusFilter" aria-label="Filter by status" title="Filter by status">
                            <option value="all">All orders</option>
                            <option value="new">New</option>
                            <option value="processing">Processing</option>
                            <option value="completed">Completed</option>
                        </select>
                        <!-- Clear all orders button: triggers confirmation dialog in JS -->
                        <button class="clear-all-btn" id="clearAllOrders">
                            <i class="fas fa-trash"></i> Tout effacer
                        </button>
                    </div>
                </div>

                <!-- DYNAMIC CONTENT AREA: Order cards rendered here by admin.js -->
                <div class="orders-container" id="ordersContainer">
                    <!-- Default placeholder: replaced when orders are loaded from localStorage -->
                    <div class="no-orders">
                        <i class="fas fa-inbox"></i>
                        <p>Aucune commande pour le moment</p>
                    </div>
                </div>
            </div>
        </section>
    </div>

    <!--
        ========================================================================
        JAVASCRIPT FILES (load order matters)
        ========================================================================
        1. js/products.js : Product data model and utility functions.
           - Defines product class/structure.
           - Handles product CRUD operations on localStorage.

        2. js/admin.js    : Main admin panel controller.
           - Login authentication logic.
           - Dashboard initialization and tab navigation.
           - Stats calculation from order data.
           - Order rendering and management (filter, clear).
           - Product form handling (add, edit, delete).
        ========================================================================
    -->
    <script src="js/products.js"></script>
    <script src="js/admin.js"></script>
</body>
</html>
